[changelog]
header = "# Changelog\n\nAll notable changes to this project are documented in this file.\n"
body = """
{% if version %}
## {{ version }} - {{ timestamp | date(format=\"%Y-%m-%d\") }}
{% else %}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute=\"group\") %}
### {{ group }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | trim }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
sort_commits = "oldest"
commit_parsers = [
  { message = "^chore\\(release\\):|^chore: release v", skip = true },
  { message = "^feat",      group = "🚀 Features"      },
  { message = "^fix",       group = "🐛 Bug Fixes"      },
  { message = "^docs?",     group = "📚 Documentation"  },
  { message = "^perf",      group = "⚡ Performance"    },
  { message = "^refactor",  group = "🚜 Refactor"       },
  { message = "^test",      group = "🧪 Testing"        },
  { message = "^chore|^ci", group = "⚙️ Miscellaneous" },
  { message = "^revert",    group = "◀️ Revert"         },
]
filter_commits = true
tag_pattern = "v[0-9].*"

# Fallback only — never exercised while tags matching tag_pattern exist.
[bump]
initial_tag = "v0.1.0"
