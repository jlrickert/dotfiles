# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: common-shell
  description: Shared POSIX shell environment (PATH, XDG, locale, EDITOR, profile.d drop dir)
  version: 0.6.2
  tags:
    - shell
    - common
  platforms:
    - darwin
    - linux

links:
  profile: "@config/dots/user/profile"
  starship.toml: "@config/starship.toml"
  bin/la: "@home/.local/bin/la"
  completions/la.bash: "@config/bash/completions/la.bash"
  completions/_la: "@config/zsh/completions/_la"
  bat/themes/tokyonight_night.tmTheme: "@config/bat/themes/tokyonight_night.tmTheme"
  bat/themes/tokyonight_day.tmTheme: "@config/bat/themes/tokyonight_day.tmTheme"
  bat/themes/LICENSE.tokyonight: "@config/bat/themes/LICENSE.tokyonight"
  bat/themes/kanagawa_dragon.tmTheme: "@config/bat/themes/kanagawa_dragon.tmTheme"
  bat/themes/kanagawa_lotus.tmTheme: "@config/bat/themes/kanagawa_lotus.tmTheme"
  bat/themes/kanagawa_wave.tmTheme: "@config/bat/themes/kanagawa_wave.tmTheme"
  bat/themes/LICENSE.kanagawa: "@config/bat/themes/LICENSE.kanagawa"
  profile.d/ssh-agent.sh: "@config/dots/user/profile.d/ssh-agent.sh"

hooks:
  post_install: hooks/install-tools.sh
