# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: zsh
  description: Zsh shell configuration (installs zsh if missing)
  version: 0.2.0
  requires:
    - '@self/common-shell'
  tags:
    - shell
    - zsh
  platforms:
    - darwin
    - linux
links:
  stub-zshenv: .zshenv
  stub-zshrc: .zshrc
  zshenv: '@config/zsh/zshenv'
  zshrc: '@config/zsh/zshrc'
hooks:
  post_install: hooks/install-zsh.sh
