# User-level overrides for libpod / podman.
# System defaults live at /etc/containers/containers.conf and
# /opt/podman/etc/containers/containers.conf (shipped by Podman Desktop).
# Only override what we need; everything else is inherited.

[engine]
# Silence the "Executing external compose provider ..." banner that podman
# prints on every `podman compose ...` / `docker compose ...` invocation.
# The warning exists to remind users that compose is provided by an external
# binary rather than podman itself; we've made an informed choice (see
# podman/README.md) so the reminder is noise.
compose_warning_logs = false

# Pin podman-compose as the compose provider. The podman/ package installs
# podman-compose into ~/.local/bin via `uv tool install` (see
# hooks/install-podman.sh), and the common-shell profile.d wiring puts
# ~/.local/bin on PATH. Explicit pinning prevents podman from picking up a
# stray /usr/local/bin/docker-compose (the brew/Docker Desktop shim) when
# PATH ordering shifts.
compose_providers = ["podman-compose"]
