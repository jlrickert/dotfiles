# Managed by dotfiles (jlrickert/dotfiles → ssh/).
# Edit this file to change SSH defaults; do not edit ~/.ssh/config inside
# the BEGIN/END dotfiles-ssh marker block — that block only Includes this file.

# UseKeychain is macOS-only. IgnoreUnknown tells Linux OpenSSH to skip it
# without erroring out, so the same file works on both platforms.
IgnoreUnknown UseKeychain

Host *
	AddKeysToAgent yes
	UseKeychain yes
