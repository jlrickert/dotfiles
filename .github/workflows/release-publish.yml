name: Release Publish
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  packages: write
concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Error: tag '$TAG' is not semver (vX.Y.Z); skipping publish." >&2
            exit 1
          fi
          MAJOR_MINOR="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          echo "Publishing $TAG (also tagging $MAJOR_MINOR, latest)"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Ensure clean git state
        run: |
          git clean -ffdx
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: working tree is dirty before publish." >&2
            git status --porcelain
            exit 1
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Ubuntu image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu/Dockerfile
          push: true
          tags: |
            ghcr.io/jlrickert/dotfiles:${{ steps.version.outputs.version }}
            ghcr.io/jlrickert/dotfiles:${{ steps.version.outputs.major_minor }}
            ghcr.io/jlrickert/dotfiles:latest
