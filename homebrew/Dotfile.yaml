# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: homebrew
  description: Homebrew package manager (darwin only) + brew shellenv loader
  version: 0.2.0
  tags:
    - package-manager
  platforms:
    - darwin
links: {}
# Links and hooks live under platform.darwin so installers on linux silently
# noop instead of failing. Mirrors the launchd-plist pattern in zellij/.
platform:
  darwin:
    links:
      profile.d/homebrew.sh: "@config/dots/user/profile.d/homebrew.sh"
    hooks:
      post_install: hooks/install-homebrew.sh
