# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: git
  description: git config + delta + global ignore
  version: 0.1.0
  tags:
    - git
    - vcs
  platforms:
    - darwin
    - linux
  requires:
    - "@self/common-shell"
links:
  ignore: "@config/git/ignore"
hooks:
  post_install: hooks/install-git.sh
  pre_remove: hooks/uninstall-git.sh
