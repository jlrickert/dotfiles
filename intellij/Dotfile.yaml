# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: intellij
  description: IntelliJ IDEA ideavimrc plus the `ide` launcher with bash/zsh completions
  version: 0.1.0
  tags:
    - editor
    - jetbrains
  platforms:
    - darwin
    - linux

links:
  ideavimrc: "@home/.ideavimrc"
  bin/ide: "@bin/ide"
  completions/ide.bash: "@config/bash/completions/ide.bash"
  completions/_ide: "@config/zsh/completions/_ide"
