# yaml-language-server: $schema=https://raw.githubusercontent.com/jlrickert/dots/main/schemas/dotfile.json
package:
  name: go
  description: Go toolchain (go env config + PATH bits, brew on darwin, tarball on linux)
  version: 0.1.0
  requires:
    - "@self/common-shell"
  tags:
    - language
    - go
  platforms:
    - darwin
    - linux

links:
  env: "@config/go/env"
  profile.d/go.sh: "@config/dots/profile.d/go.sh"

hooks:
  post_install: hooks/install-go.sh
