services:
  ubuntu:
    # The image tag is local-only so `compose run` never tries to pull from
    # ghcr.io — these services exist to test the working tree. The build
    # still tags the registry names so `task push:ubuntu` works.
    image: dotfiles:ubuntu
    build:
      context: .
      dockerfile: docker/ubuntu/Dockerfile
      tags:
        - dotfiles:ubuntu
        - ghcr.io/jlrickert/dotfiles:ubuntu
        - ghcr.io/jlrickert/dotfiles:ubuntu-${DOTFILES_REF:-latest}

  ubuntu-test:
    extends:
      service: ubuntu
    entrypoint: ["/opt/dotfiles-src/tests/e2e/verify.sh"]
